<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Brand Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${brand.id == null} ? 'Thêm Thương Hiệu Mới' : 'Cập Nhật Thương Hiệu'"></h2>

    <form th:action="@{/brands/save}" method="post" th:object="${brand}">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Tên thương hiệu</label>
            <input type="text" class="form-control" th:field="*{name}" required/>
            <p class="text-danger" th:errors="*{name}"></p>
        </div>

        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a href="/brands" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>

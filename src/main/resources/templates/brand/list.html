<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Thương hiệu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Danh sách Thương hiệu</h2>
    <a href="/brands/create" class="btn btn-success mb-3">+ Thêm Thương Hiệu Mới</a>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên Thương Hiệu</th>
            <th>Mô Tả</th>
            <th>Số Thiết Bị</th>
            <th>Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${brands}">
            <td th:text="${b.id}"></td>
            <td th:text="${b.name}"></td>
            <td th:text="${b.description}"></td>
            <td th:text="${b.devices != null ? b.devices.size() : 0}"></td>
            <td>
                <a th:href="@{/brands/edit/{id}(id=${b.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <a th:href="@{/brands/delete/{id}(id=${b.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Xóa thương hiệu này? Tất cả thiết bị sẽ mất thương hiệu.')">
                    Xóa
                </a>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/devices" class="btn btn-info">Quản lý Thiết Bị</a>
</div>
</body>
</html>

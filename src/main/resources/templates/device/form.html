<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Device Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${device.id == null} ? 'Thêm Thiết Bị Mới' : 'Cập Nhật Thiết Bị'"></h2>

    <form th:action="@{/devices/save}" method="post" enctype="multipart/form-data" th:object="${device}">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label>Tên Thiết Bị</label>
            <input type="text" class="form-control" th:field="*{deviceName}"/>
            <p class="text-danger" th:errors="*{deviceName}"></p>
        </div>

        <div class="mb-3">
            <label>Mã Model</label>
            <input type="text" class="form-control" th:field="*{modelCode}"/>
            <p class="text-danger" th:errors="*{modelCode}"></p>
        </div>

        <div class="mb-3">
            <label>Giá (VND)</label>
            <input type="number" step="1000" class="form-control" th:field="*{price}"/>
            <p class="text-danger" th:errors="*{price}"></p>
        </div>

        <div class="mb-3">
            <label>Ngày Sản Xuất</label>
            <input type="date" class="form-control" th:field="*{manufactureDate}"/>
            <p class="text-danger" th:errors="*{manufactureDate}"></p>
        </div>

        <div class="mb-3">
            <label>Thương Hiệu</label>
            <select class="form-select" th:field="*{brand.id}">
                <option value="">-- Chọn thương hiệu --</option>
                <option th:each="b : ${brands}"
                        th:value="${b.id}"
                        th:text="${b.name}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label>Hình Ảnh Sản Phẩm</label>
            <input type="file" class="form-control" name="file" accept="image/*"/>
            <div th:if="${device.productImage != null}">
                <img th:src="@{'/uploads/' + ${device.productImage}}" width="150" class="mt-2"/>
            </div>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" th:field="*{isAvailable}"/>
            <label class="form-check-label">Còn hàng</label>
        </div>

        <button type="submit" class="btn btn-primary">Lưu Thiết Bị</button>
        <a href="/devices" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Thiết Bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        img { max-height: 50px; }
    </style>
</head>
<body>
<div class="container mt-4">

    <h2>Danh sách Thiết Bị</h2>

    <div class="mb-3">
        <a href="/devices/create" class="btn btn-primary">+ Thêm Thiết Bị Mới</a>
        <a href="/brands" class="btn btn-secondary">Quản lý Thương Hiệu</a>
    </div>

    <form method="get" action="/devices" class="row g-3 mb-4">
        <div class="col-md-5">
            <input type="text" class="form-control"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="Tìm theo tên thiết bị..."/>
        </div>
        <div class="col-md-4">
            <select class="form-select" name="brandId">
                <option value="">Tất cả Thương Hiệu</option>
                <option th:each="b : ${brands}"
                        th:value="${b.id}"
                        th:selected="${b.id == brandId}"
                        th:text="${b.name}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary w-100">Tìm Kiếm</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên Thiết Bị</th>
            <th>Mã Model</th>
            <th>Thương Hiệu</th>
            <th>Giá</th>
            <th>Ngày SX</th>
            <th>Hình Ảnh</th>
            <th>Trạng Thái</th>
            <th>Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${devices.content}">
            <td th:text="${d.id}"></td>
            <td th:text="${d.deviceName}"></td>
            <td th:text="${d.modelCode}"></td>
            <td>
                <span th:if="${d.brand != null}" th:text="${d.brand.name}"></span>
                <span th:if="${d.brand == null}" class="text-muted">Không có</span>
            </td>
            <td th:text="${d.price != null ? d.price : '---'}"></td>
            <td th:text="${d.manufactureDate}"></td>
            <td>
                <img th:if="${d.productImage != null}"
                     th:src="@{'/uploads/' + ${d.productImage}}"
                     width="70"/>
            </td>
            <td>
                <span th:if="${d.isAvailable == true}" class="text-success">Còn hàng</span>
                <span th:if="${d.isAvailable == false}" class="text-danger">Hết hàng</span>
                <span th:if="${d.isAvailable == null}" class="text-warning">Không xác định</span>
            </td>
            <td>
                <a th:href="@{/devices/edit/{id}(id=${d.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <a th:href="@{/devices/delete/{id}(id=${d.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Xóa thiết bị này?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center">
        <p>
            Trang <span th:text="${devices.number + 1}"></span> /
            <span th:text="${devices.totalPages}"></span>
            (Tổng <span th:text="${devices.totalElements}"></span> thiết bị)
        </p>

        <nav>
            <ul class="pagination">
                <li class="page-item" th:classappend="${!devices.hasPrevious()} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/devices(page=${devices.number - 1}, keyword=${keyword}, brandId=${brandId})}">Trước</a>
                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, devices.totalPages - 1)}"
                    th:classappend="${i == devices.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/devices(page=${i}, keyword=${keyword}, brandId=${brandId})}"
                       th:text="${i + 1}"></a>
                </li>

                <li class="page-item" th:classappend="${!devices.hasNext()} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/devices(page=${devices.number + 1}, keyword=${keyword}, brandId=${brandId})}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>

</div>
</body>
</html>
